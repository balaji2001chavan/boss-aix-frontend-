<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AIX AI</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#05060f;
  color:white;
  overflow:hidden;
}

/* animated background */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle,#00ffe144,transparent);
  animation:move 10s linear infinite;
  z-index:-1;
}

@keyframes move{
  from{transform:translate(-20%,-20%)}
  to{transform:translate(20%,20%)}
}

.container{
  width:80%;
  margin:auto;
  margin-top:40px;
  backdrop-filter:blur(20px);
  background:#ffffff10;
  border-radius:15px;
  padding:20px;
  height:80vh;
  display:flex;
  flex-direction:column;
}

#chat{
  flex:1;
  overflow:auto;
}

.msg{
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

.user{background:#007bff55}
.ai{background:#00ff9955}

.input-area{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#00ffd5;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#00bfa5;
}

</style>
</head>

<body>

<div class="container">

<h2>🤖 AIX Smart AI</h2>

<div id="chat"></div>

<div class="input-area">
<input id="message" placeholder="AIX ला काहीही विचार..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
